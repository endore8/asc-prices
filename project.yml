name: PriceLocalizer
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PriceLocalizer:
    type: application
    platform: macOS
    sources:
      - path: PriceLocalizer/Sources
      - path: PriceLocalizer/Resources
    entitlements:
      path: PriceLocalizer/Resources/PriceLocalizer.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.endore8.price-localizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.endore8.price-localizer
        PRODUCT_NAME: "Price Localizer"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: "Price Localizer"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "3K4R6ZGH22"
        SWIFT_STRICT_CONCURRENCY: complete
        DEAD_CODE_STRIPPING: YES
